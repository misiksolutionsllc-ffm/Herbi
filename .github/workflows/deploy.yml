name: Deploy

# Applies Supabase migrations + deploys to Vercel on every push to main.
#
# Required GitHub repo secrets:
#   SUPABASE_DB_URL    postgresql://postgres:<password>@db.<ref>.supabase.co:5432/postgres
#   VERCEL_TOKEN       from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      from .vercel/project.json after `vercel link` locally
#   VERCEL_PROJECT_ID  same file
#
# App runtime env vars (NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, etc.) live in the Vercel project's
# Environment Variables — `vercel pull` fetches them during the build step.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify secret is present
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set. See .github/workflows/deploy.yml for format."
            exit 1
          fi

      - name: Apply migrations in order
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No migrations found — skipping."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "::group::Applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
            echo "::endgroup::"
          done

  deploy:
    name: Deploy to Vercel
    needs: migrate
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Vercel secrets
        run: |
          for var in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var secret is not set."
              exit 1
            fi
          done

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull Vercel production env
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifacts
        id: deploy
        run: |
          url=$(npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Write deploy URL to summary
        run: |
          {
            echo "### Deployed"
            echo ""
            echo "${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
